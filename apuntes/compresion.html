<script type="text/babel">
const {useState,useEffect} = React;
const sh=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};

const P={
threshold:[{l:"Gentle",v:-10},{l:"Moderate",v:-18},{l:"Aggressive",v:-28},{l:"Crush",v:-38}],
ratio:[{l:"Natural",v:2},{l:"Moderate",v:4},{l:"Heavy",v:6},{l:"Crush",v:8},{l:"Limit",v:10}],
attack:[{l:"Instant",v:0.1},{l:"Snappy",v:2},{l:"Punchy",v:5},{l:"Medium",v:15},{l:"Slow",v:30},{l:"Lazy",v:50}],
release:[{l:"Snap",v:40},{l:"Fast",v:100},{l:"Musical",v:250},{l:"Slow",v:500},{l:"Auto",v:-1}],
knee:[{l:"Hard",v:0},{l:"Medium",v:6},{l:"Soft",v:12},{l:"V.Soft",v:20}],
mix:[{l:"Dry",v:0},{l:"Subtle",v:25},{l:"Balanced",v:50},{l:"Wet",v:75},{l:"Full",v:100}]
};
const Un={threshold:" dB",ratio:":1",attack:" ms",release:" ms",knee:" dB",mix:"%"};
const Nm={threshold:"Threshold",ratio:"Ratio",attack:"Attack",release:"Release",knee:"Knee",mix:"Mix"};

const GC=[
{id:"pop",t:"🎤 Pop — Presente y Clara",b:"La cantante susurra en los versos y explota en los coros. Los sintetizadores y la percusión ocupan mucho espacio en la mezcla. Sin compresión la voz desaparece en los versos y satura en los coros. Necesitas que cada sílaba esté al frente, presente y con vida, sin sonar aplastada ni artificial.",h:"Piensa FET (1176): el threshold Moderate trabaja el cuerpo de la voz, no solo los gritos. Ratio 4:1 controla sin aplastar. Ataque Punchy (5ms) es clave: deja pasar el golpe de las consonantes ('p','t','k') que dan claridad a la dicción sobre los sintes. Release Musical (250ms) deja respirar entre frases. Knee Medium suaviza la entrada al compresor.",i:{threshold:-18,ratio:4,attack:5,release:250,knee:6,mix:100},c:"Pop · Voz al frente"},
{id:"rck",t:"🎸 Rock — Cortar Guitarras",b:"Voz masculina potente sobre guitarras distorsionadas y batería pesada. La voz se pierde entre los riffs: las guitarras ocupan el mismo rango de frecuencia. Cuando el cantante grita en el estribillo se escucha, pero en las estrofas desaparece detrás del muro de sonido. Necesitas que la voz corte esa mezcla densa como un cuchillo.",h:"FET agresivo: necesitas que la voz empuje. Threshold Moderate para comprimir bien el cuerpo vocal. Ratio Heavy (6:1) para que la voz tenga densidad constante contra las guitarras. Ataque Snappy (2ms) es muy rápido pero deja un micro-transitorio que da 'mordida' a la voz. Release Fast (100ms) sigue la energía del rock. Hard Knee: compresión directa, sin sutilezas.",i:{threshold:-18,ratio:6,attack:2,release:100,knee:0,mix:100},c:"Rock · Voz vs guitarras"},
{id:"bal",t:"🎹 Balada — Emoción Intacta",b:"La cantante interpreta con el corazón: empieza casi hablando sobre un piano suave, va creciendo emocionalmente, y en el clímax da todo con un vibrato hermoso. La dinámica ES la canción. Si comprimes mucho, matas la emoción. Si no comprimes, los susurros no se escuchan y el clímax satura. Necesitas controlar sin que se note absolutamente nada.",h:"Piensa OPTO (LA-2A): compresión que respira con la música. Threshold Gentle (–10dB) solo toca los picos más altos del clímax. Ratio Natural (2:1) es casi imperceptible. Ataque Slow (30ms) deja pasar TODO el transitorio emocional. Release Slow (500ms) suelta gradualmente sin bombeo. Knee Very Soft: la compresión entra tan suavemente que es invisible.",i:{threshold:-10,ratio:2,attack:30,release:500,knee:20,mix:100},c:"Balada · Dinámica emocional"},
{id:"rap",t:"🎤 Rap — Dicción Rítmica",b:"El rapero tiene un flow rapidísimo con muchas consonantes percusivas. La pista tiene 808s enormes y hi-hats brillantes. Cada sílaba rapeada debe ser perfectamente inteligible: si pierdes una palabra, pierdes el mensaje. La voz necesita sonar in-your-face, moderna, con peso en cada consonante.",h:"FET (1176) es tu arma aquí. Threshold Moderate trabaja todo el verso. Ratio Heavy (6:1) da densidad constante para que ninguna sílaba se pierda detrás del 808. Ataque Punchy (5ms) deja pasar el golpe percusivo de las consonantes ('b','d','g') que hacen el rap inteligible. Release Fast (100ms) suelta rápido para seguir el ritmo. Hard Knee: control directo.",i:{threshold:-18,ratio:6,attack:5,release:100,knee:0,mix:100},c:"Hip-Hop · Cada sílaba cuenta"},
{id:"aud",t:"📖 Cantautor Acústico",b:"Cantautor con guitarra acústica, grabación íntima. La voz es suave y cálida, con momentos donde sube la intensidad. La guitarra y la voz comparten frecuencias medias. El sonido debe ser natural y orgánico, como si estuvieras en la sala con el artista. Nada debe sonar procesado, pero necesitas que la voz siempre esté por delante de la guitarra.",h:"OPTO es perfecto para esto: transparencia total. Threshold Moderate para trabajar el cuerpo sin exagerar. Ratio Natural (2:1) mantiene la naturalidad orgánica. Ataque Medium (15ms) deja los transitorios intactos para que la voz suene 'real'. Release Auto se adapta al fraseo del cantautor. Knee Soft (12dB) para transiciones graduales e invisibles.",i:{threshold:-18,ratio:2,attack:15,release:-1,knee:12,mix:100},c:"Acústico · Natural e íntimo"},
{id:"cho",t:"🎶 Solista sobre Coro",b:"Una solista canta sobre un arreglo coral a 4 voces. El coro suena hermoso pero tiende a 'tragarse' a la solista, especialmente en los pasajes fuertes donde todos cantan juntos. Necesitas que la voz principal se separe del coro y se sienta 'más cerca' del oyente, sin destruir la naturalidad.",h:"VCA es ideal: preciso sin colorear. Threshold Gentle (–10dB) solo toca los momentos donde el coro compite con la solista. Ratio Moderate (4:1) da control evidente pero musical. Ataque Medium (15ms) preserva la naturalidad del fraseo. Release Musical (250ms) respira con las frases corales. Knee Medium: balance entre control y musicalidad.",i:{threshold:-10,ratio:4,attack:15,release:250,knee:6,mix:100},c:"Coral · Solista al frente"},
{id:"str",t:"📺 Cover para Redes",b:"Grabas un cover en tu cuarto para Instagram/TikTok. La pista de acompañamiento suena fuerte y profesional, pero tu voz grabada en casa suena débil, con volumen irregular y se pierde en las partes instrumentales más densas. Necesitas que tu voz suene 'a la altura' del instrumental, consistente y presente.",h:"Tu voz necesita compresión seria para competir con un master profesional. Threshold Aggressive (–28dB) porque la diferencia dinámica es grande. Ratio Moderate (4:1) controla sin destruir tu interpretación. Ataque Punchy (5ms) le da claridad a tu dicción. Release Auto se adapta porque los covers tienen secciones muy variadas. Knee Medium.",i:{threshold:-28,ratio:4,attack:5,release:-1,knee:6,mix:100},c:"Cover · Competir con el track"},
{id:"com",t:"📻 Voz Épica — Trailer",b:"Imagina la voz de un trailer de película: profunda, ENORME, cada palabra con peso cinematográfico. El instrumental tiene percusión orquestal, cuerdas e impactos. La voz necesita sonar más grande que la vida, ultra-presente, con una densidad que se sienta en el pecho.",h:"FET al máximo: compresión como efecto creativo. Threshold Aggressive (–28dB) trabaja TODO el rango vocal. Ratio Heavy (6:1) aplasta la dinámica para dar densidad brutal. Ataque Punchy (5ms) deja el peso de las consonantes graves. Release Fast (100ms) mantiene la energía entre frases. Hard Knee: compresión inmediata.",i:{threshold:-28,ratio:6,attack:5,release:100,knee:0,mix:100},c:"Cinematic · Voz gigante"},
{id:"harm",t:"🎵 Armonías Vocales",b:"Tienes tres pistas de armonías vocales (terceras y quintas) que acompañan a la voz principal. Suenan bien individualmente pero juntas tienen volúmenes irregulares: algunas notas sobresalen y rompen el acorde, otras desaparecen. Necesitas que las armonías suenen como una 'cama' suave y consistente que abrace a la voz principal sin competir.",h:"VCA o OPTO: transparencia es clave. Threshold Moderate (–18dB) para nivelar inconsistencias. Ratio Moderate (4:1) iguala las notas sin aplastar. Ataque Medium (15ms) preserva el inicio natural de cada nota. Release Musical (250ms) suelta suavemente. Knee Soft: transición gradual para que suene como 'una sola voz'.",i:{threshold:-18,ratio:4,attack:15,release:250,knee:12,mix:100},c:"Armonías · Cama vocal suave"},
{id:"dbl",t:"🎙️ Doble Vocal — Grosor",b:"Grabaste la voz principal dos veces (double tracking) para darle grosor. Pero las dos tomas tienen diferencias de volumen: a veces una toma domina y se nota que son dos voces separadas en vez de sonar como 'una voz enorme'. Necesitas que ambas tomas se fusionen en un sonido gordo y cohesivo.",h:"VCA o Digital: precisión total para igualar. Threshold Moderate para trabajar el cuerpo. Ratio Moderate (4:1) nivela diferencias entre tomas. Ataque Medium (15ms) deja el inicio natural. Release Musical (250ms) para que ambas respiren igual. Knee Medium. Aplica la MISMA configuración a ambas tomas.",i:{threshold:-18,ratio:4,attack:15,release:250,knee:6,mix:100},c:"Double · Fusionar tomas"}
];

const SC=[
{id:"ny",t:"🏙️ NY Parallel — Densidad",b:"Tu voz suena bien pero le falta 'cuerpo'. Comparada con producciones profesionales se siente delgada y pequeña. Quieres esa sensación de densidad que tiene una voz de radio: grande, llena, que ocupa espacio. La técnica NY mezcla una copia brutalmente comprimida con tu señal seca.",h:"PARALELA NY: La copia se DESTRUYE a propósito. Threshold Crush (–38dB) captura todo. Ratio Crush (8:1) aplasta. Ataque Instant (0.1ms) no deja escapar nada. Release Fast. Hard Knee. PERO el secreto: Mix solo 25% (Subtle). Añades un 'colchón' de densidad debajo de tu voz natural.",tc:"Comp. Paralela",i:{threshold:-38,ratio:8,attack:0.1,release:100,knee:0,mix:25},c:"Paralela · Cuerpo",sm:1},
{id:"des",t:"✂️ De-Esser — Sibilancia",b:"La voz suena brillante y abierta, pero las 'eses' y las 'ches' pinchan los oídos, especialmente con audífonos. Necesitas un compresor que SOLO actúe en la banda 4–10 kHz, que atrape cada sibilante sin quitar el brillo general.",h:"SIDECHAIN FILTRADO: Threshold Gentle (–10dB) para que solo las sibilantes más agresivas lo disparen. Ratio Limit (10:1) como limitador. Ataque Instant (0.1ms) porque las sibilantes son ultracortas. Release Snap (40ms) suelta inmediatamente. Hard Knee: acción precisa.",tc:"SC De-Essing",i:{threshold:-10,ratio:10,attack:0.1,release:40,knee:0,mix:100},c:"Quirúrgico · Sin sibilancia"},
{id:"sg",t:"🔗 Serie Glue — Cohesión",b:"Ya pasaste tu voz por un FET rápido que capturó los picos. La voz suena controlada pero todavía 'fragmentada', como si cada frase fuera un evento separado. Necesitas un segundo compresor suave que le dé cohesión y 'pegue' todo como un río continuo.",h:"SERIE 2ª ETAPA: Threshold Gentle (–10dB) solo toca variaciones residuales. Ratio Natural (2:1) casi imperceptible. Ataque Slow (30ms) no interfiere con el primer comp. Release Auto se adapta. Knee Soft: transición invisible. Piensa OPTO o VCA.",tc:"Serie 2ª etapa",i:{threshold:-10,ratio:2,attack:30,release:-1,knee:12,mix:100},c:"Glue · Flujo continuo"},
{id:"sc2",t:"⚡ Serie Captura — Picos",b:"Tu voz tiene picos impredecibles: consonantes que explotan, notas agudas que se disparan 10 dB. Necesitas un primer compresor rápido que atrape esos picos antes del segundo compresor suave.",h:"SERIE 1ª ETAPA: FET (1176). Threshold Moderate (–18dB) trabaja picos principales. Ratio Heavy (6:1) los controla. Ataque Snappy (2ms) ultrarrápido pero deja micro-transitorio de articulación. Release Fast (100ms) listo para el siguiente pico. Hard Knee: acción inmediata.",tc:"Serie 1ª etapa",i:{threshold:-18,ratio:6,attack:2,release:100,knee:0,mix:100},c:"Captura · Domar picos"},
{id:"ps",t:"🌊 Paralela Sutil — Terciopelo",b:"Tu voz de balada/jazz suena bonita y natural, pero le falta ese 'terciopelo', esa calidez que escuchas en grabaciones profesionales. No quieres paralela agresiva: quieres algo tan sutil que nadie pueda señalar qué cambiaste, pero todos noten que 'suena mejor'.",h:"PARALELA SUTIL: La copia no se destruye tanto. Threshold Aggressive (–28dB) trabaja el cuerpo. Ratio Heavy (6:1) da densidad. Punchy (5ms) conserva articulación. Musical (250ms) respira. Knee Medium. Mix Subtle (25%): apenas un susurro de señal comprimida debajo.",tc:"Paralela Sutil",i:{threshold:-28,ratio:6,attack:5,release:250,knee:6,mix:25},c:"Sutil · Terciopelo",sm:1},
{id:"dg",t:"🔔 De-Essing Suave — Aire",b:"Tu voz tiene un brillo hermoso y aéreo que no quieres perder, pero hay sibilancia leve que molesta en ciertas frases. Un de-esser agresivo oscurecería la voz. Necesitas domar las sibilantes sin tocar el espectro brillante.",h:"DE-ESSING CONSERVADOR: Threshold Moderate (–18dB) para captar más sibilantes. Ratio Moderate (4:1) reduce sin limitar: doma pero deja energía natural. Instant (0.1ms) atrapa el transitorio. Fast (100ms) suelta pronto. Knee Medium. Resultado: sibilantes controladas, 'aire' intacto.",tc:"SC De-Essing",i:{threshold:-18,ratio:4,attack:0.1,release:100,knee:6,mix:100},c:"Conservador · Preservar aire"},
{id:"pa2",t:"💥 Paralela Wall of Sound",b:"Mezcla de hip-hop o electrónica agresiva. El instrumental es un muro de bajos y sintetizadores. Tu voz necesita ser otro muro encima: DOMINANTE. Quieres que la voz sea más grande que todo lo demás combinado.",h:"PARALELA EXTREMA: Todo al máximo en la copia. Threshold Crush (–38dB). Ratio Limit (10:1) como bloque. Instant (0.1ms). Snap (40ms). Hard Knee. Diferencia con NY clásica: Mix Balanced (50%). Mitad y mitad. Es agresivo, es obvio, es exactamente lo que quieres.",tc:"Paralela Extrema",i:{threshold:-38,ratio:10,attack:0.1,release:40,knee:0,mix:50},c:"Extrema · Muro vocal",sm:1},
{id:"sb",t:"📡 Serie Final — Seda",b:"Tu cadena vocal ya tiene un primer compresor que hizo el trabajo pesado. Ahora falta ese último toque de 'seda': que todo fluya suavemente, como las voces de producciones de primer nivel. El segundo compresor debe ser casi imperceptible.",h:"SERIE 2ª ETAPA (acabado): Threshold Gentle (–10dB), apenas toca. Ratio Natural (2:1). Ataque Slow (30ms). Release Auto. Knee Very Soft (20dB): imposible detectar cuándo actúa. Piensa en 'pulir' un diamante ya cortado. VCA o Digital para cero coloración.",tc:"Serie acabado",i:{threshold:-10,ratio:2,attack:30,release:-1,knee:20,mix:100},c:"Seda · Acabado final"}
];

const CIRC=[
{n:"FET",ic:"⚡",m:"1176 / MC77",cl:"border-l-amber-500",bg:"bg-amber-50",bd:"bg-amber-100 text-amber-700",ch:"Rápido · Agresivo · Armónicos",d:"Circuito FET (Field-Effect Transistor): el más rápido, ataques sub-milisegundo.",s:"Armónicos par e impar → saturación y presencia.",bf:"Cortar mezcla, 1ª etapa serie.",ak:"0.02–0.8 ms",fm:"Michael Jackson, Beyoncé."},
{n:"OPTO",ic:"💡",m:"LA-2A / CL 1B",cl:"border-l-emerald-500",bg:"bg-emerald-50",bd:"bg-emerald-100 text-emerald-700",ch:"Suave · Musical · Natural",d:"Circuito óptico (LDR). Inercia física → suave, program-dependent.",s:"Compresión que 'respira'. Ataque/release dependen de la señal.",bf:"Baladas, voiceover, 2ª etapa serie.",ak:"1–10 ms (variable)",fm:"LA-2A: el más usado en voces."},
{n:"VCA",ic:"🎛️",m:"SSL G-Bus / dbx 160",cl:"border-l-sky-500",bg:"bg-sky-50",bd:"bg-sky-100 text-sky-700",ch:"Transparente · Preciso",d:"VCA: preciso, predecible, sin color.",s:"Sin armónicos. Control sin alterar timbre.",bf:"Masterización, bus, 2ª etapa serie.",ak:"0.1–30 ms",fm:"SSL G-Bus: el 'glue'."},
{n:"DIGITAL",ic:"💻",m:"Pro-C / Logic Platinum",cl:"border-l-violet-500",bg:"bg-violet-50",bd:"bg-violet-100 text-violet-700",ch:"Perfecto · Look-Ahead",d:"Digital puro: look-ahead ve la señal ANTES de que llegue.",s:"Cero armónicos, cero coloración.",bf:"Mastering, limitación, de-essing digital.",ak:"0 ms (look-ahead)",fm:"FabFilter Pro-C2, Logic Platinum."}
];

const TECH=[
{n:"Compresión en Serie",ic:"🔗",co:"2+ compresores en cadena, cada uno hace poco.",ch:["Señal","→","Comp1 FET","→","Comp2 OPTO/VCA","→","Salida"],p:"Cada uno 2–4 dB. Transparente.",x:"Riesgo sobre-compresión.",tp:"1º FET picos, 2º OPTO/VCA glue."},
{n:"Paralela (NY Style)",ic:"🏙️",co:"Señal seca + copia crush. Densidad con transitorios intactos.",ch:["Señal","→[Split]","A: Dry","+ B: Crush","→[Mix]","Salida"],p:"Punch + densidad.",x:"Fase. Mix requiere práctica.",tp:"Mix 0%, sube hasta que 'crece'. 20–30%."},
{n:"SC: De-Essing",ic:"✂️",co:"SC filtrado 4–10 kHz. Solo sibilantes.",ch:["Señal","→","SC: 4–10kHz","→","Comp","→","Salida"],p:"Sin oscurecer.",x:"Threshold bajo = lispea.",tp:"Ratio 8–10:1. Instant, snap."},
{n:"SC: Anti-Bombeo",ic:"🔇",co:"HPF 80–150 Hz en SC. Graves no disparan comp.",ch:["Señal","→","SC: HPF","→","Comp","→","Sin bombeo"],p:"Evita bombeo por pops.",x:"Corte alto → menos sensible.",tp:"80–150 Hz. 'SC HPF' en plugins."},
{n:"SC: Enfoque Medios",ic:"🎯",co:"Pasa-banda 1–5 kHz en SC. Responde a presencia vocal.",ch:["Señal","→","SC: 1–5kHz","→","Comp","→","Salida"],p:"Responde a inteligibilidad.",x:"Avanzado.",tp:"Ideal mezclas densas."},
{n:"Descendente (Downward)",ic:"⬇️",co:"Estándar: REDUCE lo sobre threshold. Baja picos.",ch:["Picos","→","Threshold","→","Reducidos","→","+Makeup"],p:"La más común.",x:"Reduce nivel.",tp:"Sube Makeup Gain para compensar."},
{n:"Ascendente (Upward)",ic:"⬆️",co:"SUBE lo DEBAJO del threshold. Susurros se amplifican.",ch:["Susurros","→","Threshold","→","Amplificados","→","Detalle"],p:"Revela detalles ocultos.",x:"Amplifica ruido.",tp:"Solo grabación limpia. OTT de Xfer."}
];

const PD={
threshold:{t:"Threshold",ic:"📏",df:"Nivel donde actúa. Down: reduce arriba. Up: sube abajo.",an:"Puerta: alta (–10) = solo gigantes. Baja (–38) = todos.",rg:[["–10 dB Gentle","Solo picos. 2ª serie."],["–18 dB Moderate","Estándar vocal."],["–28 dB Aggressive","Nivelación fuerte."],["–38 dB Crush","Paralela/efectos."]]},
ratio:{t:"Ratio",ic:"⚖️",df:"Cuánto se reduce. 4:1 = cada 4 dB sobre threshold → 1 dB.",an:"Impuesto: 2:1 = poco. 10:1 = casi todo.",rg:[["2:1 Natural","Imperceptible."],["4:1 Moderate","Estándar vocal."],["6:1 Heavy","Rock, hip-hop."],["8:1 Crush","Paralela."],["10:1 Limit","De-essing."]]},
attack:{t:"Attack",ic:"⏱️",df:"Cuándo empieza tras superar threshold.",an:"Portero: Instant cierra antes. Lazy: ya pasó el golpe.",rg:[["0.1ms Instant","Captura todo."],["2ms Snappy","Micro-transitorio."],["5ms Punchy","Golpe consonante."],["15ms Medium","Balance."],["30ms Slow","Preserva transitorio."],["50ms Lazy","Solo sustain."]]},

knee:{t:"Knee (Rodilla)",ic:"🦵",df:"Gradualidad. Hard = escalón. Soft = rampa.",an:"Hard = abrupto. Soft = gradual, musical.",rg:[["0dB Hard","FET, de-essing."],["6dB Medium","Estándar."],["12dB Soft","OPTO-style."],["20dB V.Soft","Transparencia."]]},

function calcGR(th,ra,kn){const e=-6-th;if(e<=0)return 0;return Math.round((kn>0&&e<kn?(e*e)/(2*kn)*(1-1/ra):e*(1-1/ra))*10)/10;}

function analyze(s,id,hasMix){
const lg=[];let tot=0;const ks=["threshold","ratio","attack","release","knee"];if(hasMix)ks.push("mix");
ks.forEach(k=>{const sv=s[k],iv=id[k];if(sv===null){lg.push([2,`✗ ${Nm[k]}: No seleccionado.`]);return;}
const sL=P[k].find(x=>x.v===sv)?.l||sv,iL=P[k].find(x=>x.v===iv)?.l||iv;
const sD=sv===-1?"Auto":sv+Un[k],iD=iv===-1?"Auto":iv+Un[k];
if(sv===iv){lg.push([0,`✓ ${Nm[k]}: ${sL} (${sD}) — Perfecto.`]);tot+=100;}
else{const iS=P[k].findIndex(x=>x.v===sv),iI=P[k].findIndex(x=>x.v===iv),d=Math.abs(iS-iI);tot+=Math.max(0,100-d*30);
const a=k==="threshold"?(sv>iv?`Alto (${sD}). Apenas actúa.`:`Bajo (${sD}). Sobre-comprime.`):k==="ratio"?(sv<iv?`${sL} suave.`:`${sL} excesivo.`):k==="attack"?(sv<iv?`${sL} rápido.`:`${sL} lento.`):k==="release"?(sv===-1&&iv!==-1?"Auto no ideal.":sv!==-1&&iv===-1?"Fijo no ideal.":sv<iv?`${sL} rápido. Bombeo.`:`${sL} lento.`):k==="knee"?(sv<iv?`${sL} abrupta.`:`${sL} suave.`):(sv<iv?`${sL} seco.`:`${sL} wet.`);
lg.push([d<=1?1:2,`${d<=1?"⚠":"✗"} ${Nm[k]}: ${sL}→${iL} (${iD}). ${a}`]);}});
const avg=Math.round(tot/ks.length);
return{lg,avg,v:avg===100?"★ PERFECTO":avg>=80?"◆ EXCELENTE":avg>=55?"● ACEPTABLE":"○ REVISIÓN"};}

function LCD({g}){const p=Math.min(g/20,1)*100;
return <div className="bg-gray-950 rounded-xl p-3 border border-gray-700"><div className="text-center text-gray-500 text-[10px] font-mono tracking-widest mb-1">GAIN REDUCTION</div><div className="bg-black rounded-lg p-2 border border-gray-800 font-mono text-center" style={{textShadow:"0 0 10px #22c55e"}}><span className="text-green-400 text-3xl font-bold">–{g.toFixed(1)}</span><span className="text-green-600 ml-1">dB</span></div><div className="mt-2 bg-gray-900 rounded-full h-2 overflow-hidden border border-gray-700"><div className="h-full rounded-full transition-all duration-500" style={{background:g>12?"linear-gradient(90deg,#f59e0b,#ef4444)":g>6?"linear-gradient(90deg,#22c55e,#f59e0b)":"#22c55e",width:p+"%"}}/></div></div>;}

<Con r={r}/></div>;}

function RMatch(){const[si,setSi]=useState(0);const[sL,setSL]=useState(null);const[mt,setMt]=useState([]);const[wr,setWr]=useState(null);const[sR,setSR]=useState(()=>sh(MS[0].p.map(x=>x[1])));
const ms=MS[si];useEffect(()=>{setMt([]);setSL(null);setWr(null);setSR(sh(ms.p.map(x=>x[1])));},[si]);

<div className="grid grid-cols-2 gap-3"><div className="space-y-1.5">{ms.p.map(p=>{const m=mt.includes(p[0]);return <button key={p[0]} onClick={()=>!m&&setSL(p[0])} className={`w-full py-2 px-3 rounded-xl text-sm border text-left cursor-pointer font-medium ${m?"bg-emerald-50 border-emerald-200 text-emerald-400 line-through opacity-50":sL===p[0]?"bg-blue-50 border-blue-400 text-blue-700 ring-2 ring-blue-400":"bg-white border-gray-200 text-gray-700 hover:border-blue-300"}`}>{p[0]}</button>})}</div>
<div className="space-y-1.5">{sR.map(r=>{const m=ms.p.some(p=>mt.includes(p[0])&&p[1]===r);return <button key={r} onClick={()=>!m&&hr(r)} className={`w-full py-2 px-3 rounded-xl text-sm border text-left cursor-pointer ${m?"bg-emerald-50 border-emerald-200 text-emerald-400 line-through opacity-50":wr===r?"bg-red-50 border-red-400 text-red-600":"bg-white border-gray-200 text-gray-600 hover:border-blue-300"}`}>{r}</button>})}</div></div>}</div>;}

<main className="max-w-6xl mx-auto px-3 py-5" key={tab}>
{tab==="ci"&&<div className="max-w-4xl mx-auto space-y-5 animate-fi"><div className="text-center mb-5"><h2 className="text-2xl font-bold text-gray-800">Arquitecturas de Compresión</h2><p className="text-gray-500 text-sm">Cuatro circuitos fundamentales</p></div>
{CIRC.map(c=><div key={c.n} className={`bg-white rounded-2xl shadow-sm border border-gray-200 border-l-4 ${c.cl} p-5`}><div className="flex items-center gap-3 mb-3 flex-wrap"><span className="text-2xl">{c.ic}</span><div><h3 className="text-lg font-bold text-gray-800">{c.n}</h3><span className={`text-xs font-mono px-2 py-0.5 rounded-full ${c.bd}`}>{c.m}</span></div><span className="ml-auto text-xs text-gray-400 italic hidden sm:inline">{c.ch}</span></div><div className={`${c.bg} rounded-xl p-3 mb-3`}><p className="text-gray-700 text-sm">{c.d}</p></div><div className="grid md:grid-cols-2 gap-3 text-sm"><div><b className="text-gray-600">Sónico:</b><p className="text-gray-500 mt-1">{c.s}</p></div><div><b className="text-gray-600">Ideal:</b><p className="text-gray-500 mt-1">{c.bf}</p></div><div><b className="text-gray-600">Ataque:</b><p className="text-gray-500 mt-1 font-mono text-xs">{c.ak}</p></div><div><b className="text-gray-600">Famosos:</b><p className="text-gray-500 mt-1 italic">{c.fm}</p></div></div></div>)}</div>}

{tab==="te"&&<div className="max-w-4xl mx-auto space-y-5 animate-fi"><div className="text-center mb-5"><h2 className="text-2xl font-bold text-gray-800">Técnicas de Compresión</h2><p className="text-gray-500 text-sm">Serie, Paralela, Sidechain, Downward, Upward</p></div>
{TECH.map(t=><div key={t.n} className="bg-white rounded-2xl shadow-sm border p-5"><div className="flex items-center gap-3 mb-3"><span className="text-2xl">{t.ic}</span><h3 className="text-lg font-bold text-gray-800">{t.n}</h3></div><p className="text-gray-600 text-sm mb-3">{t.co}</p><div className="bg-gray-50 rounded-xl p-3 mb-3 font-mono text-[11px] overflow-x-auto"><div className="flex flex-wrap items-center gap-1.5">{t.ch.map((s,i)=><span key={i} className={s.includes("→")||s.startsWith("+")?"text-gray-400":"bg-white border border-gray-200 px-2 py-1 rounded-lg text-gray-700 shadow-sm"}>{s}</span>)}</div></div><div className="grid md:grid-cols-2 gap-3 text-sm mb-3"><div className="bg-emerald-50 rounded-xl p-3"><b className="text-emerald-700">✓ </b><span className="text-emerald-600">{t.p}</span></div><div className="bg-red-50 rounded-xl p-3"><b className="text-red-700">✗ </b><span className="text-red-600">{t.x}</span></div></div><div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-sm"><b className="text-amber-700">💡 </b><span className="text-amber-700">{t.tp}</span></div></div>)}</div>}

{tab==="pa"&&<PgParam/>}
{tab==="re"&&<PgReview/>}

{tab==="ge"&&<div className="max-w-5xl mx-auto animate-fi"><div className="text-center mb-3"><h2 className="text-xl font-bold text-gray-100">Desafíos Generales</h2><p className="text-gray-500 text-xs">{GC.length} misiones vocales</p></div><Carousel items={GC} sm={false}/></div>}

{tab==="sp"&&<div className="max-w-5xl mx-auto animate-fi"><div className="text-center mb-3"><h2 className="text-xl font-bold text-gray-100">Desafíos Avanzados</h2><p className="text-gray-500 text-xs">{SC.length} técnicas especializadas</p></div><Carousel items={SC} sm="auto"/></div>}
</main>

<footer className={`text-center py-3 text-[9px] font-mono ${dk?"text-gray-700":"text-gray-300"}`}>Estudiando la Compresión · lety2E · hecho con IA</footer>
</div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
