<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupián — lety2E</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../favicon.ico">
  <meta name="description" content="Lety2e Lupián — la faceta artística de Lety. Cantos y escritos.">
  <link rel="stylesheet" href="../style.css">
</head>
<body data-section="lupian">

<script src="../nav.js"></script>

<main>

  <section class="hero-section">
    <h1>Lupián</h1>
    <p>La faceta artística. Canto y escribo desde lo íntimo.</p>
  </section>

  <div class="puertas-grid">

    <a href="cantos/index.html" class="puerta-card" style="--puerta-accent: var(--M);">
      <img src="assets/lety-cantos.jpeg" alt="Lety cantando con micrófono"
           onerror="this.parentElement.innerHTML='<div class=puerta-ph><div class=ph-icon>🎵</div><div class=ph-note>ilustración: lety cantando</div></div><div class=puerta-label><h2>Cantos</h2><p>Covers y canciones</p></div>'">
      <div class="puerta-label">
        <h2>Cantos</h2>
        <p>Covers y canciones</p>
      </div>
    </a>

    <a href="escritos/index.html" class="puerta-card" style="--puerta-accent: var(--T);">
      <img src="assets/lety-escritos.jpeg" alt="Lety escribiendo en la cama con cojines"
           onerror="this.parentElement.innerHTML='<div class=puerta-ph><div class=ph-icon>✍︎</div><div class=ph-note>ilustración: lety escribiendo</div></div><div class=puerta-label><h2>Escritos</h2><p>Reflexiones, cuentos y textos</p></div>'">
      <div class="puerta-label">
        <h2>Escritos</h2>
        <p>Reflexiones, cuentos y textos</p>
      </div>
    </a>

  </div>

</main>

<script src="../footer.js"></script>

</body>
</html>
